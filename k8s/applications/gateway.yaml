apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrosense-api-gateway
  namespace: agrosense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agrosense-api-gateway
  template:
    metadata:
      labels:
        app: agrosense-api-gateway
    spec:
      containers:
        - name: agrosense-api-gateway
          image: klurgs/agrosense-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: agrosense-api-gateway
  namespace: agrosense
spec:
  type: LoadBalancer
  selector:
    app: agrosense-api-gateway
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: agrosense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agrosense-api-gateway
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
