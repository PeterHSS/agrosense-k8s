apiVersion: v1
kind: ConfigMap
metadata:
  name: agrosense-app-config
  namespace: agrosense
data:
  # -------------------------
  # Configurações gerais
  # -------------------------
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "info"

  # -------------------------
  # Banco de dados - Alert
  # -------------------------
  ALERT_DB_HOST: "postgres-alerts"
  ALERT_DB_PORT: "5432"
  ALERT_DB_NAME: "alerts"

  # -------------------------
  # Banco de dados - Identity
  # -------------------------
  IDENTITY_DB_HOST: "postgres-identity"
  IDENTITY_DB_PORT: "5432"
  IDENTITY_DB_NAME: "identity"

  # -------------------------
  # Banco de dados - Property
  # -------------------------
  PROPERTY_DB_HOST: "postgres-property"
  PROPERTY_DB_PORT: "5432"
  PROPERTY_DB_NAME: "property"

  # -------------------------
  # Banco de dados - Sensor
  # -------------------------
  SENSOR_DB_HOST: "postgres-sensor-ingestion"
  SENSOR_DB_PORT: "5432"
  SENSOR_DB_NAME: "sensor"

  # -------------------------
  # RabbitMQ
  # -------------------------
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"

  # -------------------------
  # Observabilidade
  # -------------------------
  GRAFANA_URL: "http://grafana:3000"
  PROMETHEUS_URL: "http://prometheus:9090"
  LOKI_URL: "http://loki:3100"
