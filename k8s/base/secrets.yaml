apiVersion: v1
kind: Secret
metadata:
  name: agrosense-app-secret
  namespace: agrosense
type: Opaque
stringData:
  # -------------------------
  # Banco de dados - senhas
  # -------------------------
  ALERT_DB_USER: "postgres"
  ALERT_DB_PASSWORD: "troque-aqui"

  IDENTITY_DB_USER: "postgres"
  IDENTITY_DB_PASSWORD: "troque-aqui"

  PROPERTY_DB_USER: "postgres"
  PROPERTY_DB_PASSWORD: "troque-aqui"

  SENSOR_DB_USER: "postgres"
  SENSOR_DB_PASSWORD: "troque-aqui"

  # -------------------------
  # RabbitMQ
  # -------------------------
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "troque-aqui"

  # -------------------------
  # JWT / Auth
  # -------------------------
  JWT_SECRET: "troque-aqui"
  JWT_EXPIRATION: "3600"

  # -------------------------
  # API Keys externas (se houver)
  # -------------------------
  API_KEY: "troque-aqui"
