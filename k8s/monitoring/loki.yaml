apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: agrosense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: agrosense
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
